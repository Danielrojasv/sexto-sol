# SEXTO SOL — Pool de cartas Tezhal v4.2 (Modelo B2 — Premonición como Lectura)
# 15 cartas: 5 Ataque + 5 Defensa + 5 Ritual.
#
# Cambios v4.1 → v4.2:
#   - Nuevo campo top-level `penalizacion_acierto` (fuerza perdida si el rival
#     acierta la premonición que apuntó a ESTA carta). Valor entero ≥ 0.
#   - Eliminadas cláusulas premonicion_* (la premonición ya no es condicional
#     sobre la carta — afecta la carta del rival, no la propia).
#   - Condicionales ahora son sobre ESTADO DEL JUEGO:
#       heroe_estado, tramo, atributo_propio, atributo_oponente, eclipse_activo.
#   - SideEffects válidos en v4.2:
#       descarte_oponente, robo_propio, mirar_mazo_oponente, bloqueo_planeta.
#
# Vibe Tezhal: aggro, comprometerse temprano, fuerza_base alta y penalización
# baja (Tezhal resiste mejor la lectura del rival). Sus condicionales premian
# tramos avanzados (sexto_sol) y héroe despertado/ascendido. Sus sideEffects
# castigan al rival con descartes o lo presionan con robos propios para
# mantener tempo.
#
# Balance esperado (sanity check):
#   - Tezhal fuerza_base promedio ≈ 3.7 (> Würon)
#   - Tezhal penalizacion_acierto promedio ≈ 1.1 (< Würon)

cards:
  - id: TZH-001
    nombre: Lanza Solar
    raza: Tezhal
    categoria: Ataque
    coste: 2
    fuerza_base: 3
    penalizacion_acierto: 1
    rareza: comun
    condicionales:
      - tipo: heroe_estado
        valor: despertado
        fuerzaDelta: 1
        efectoTexto: "Héroe despertado: +1 fuerza"
    flavor: El primer rayo cae antes de que el enemigo nombre su miedo.

  - id: TZH-002
    nombre: Filo del Tonatzin
    raza: Tezhal
    categoria: Ataque
    coste: 1
    fuerza_base: 2
    penalizacion_acierto: 0
    rareza: comun
    condicionales: []
    flavor: Los filos no negocian. Se cruzan.

  - id: TZH-003
    nombre: Cuchilla del Quinto Sol
    raza: Tezhal
    categoria: Ataque
    coste: 4
    fuerza_base: 5
    penalizacion_acierto: 2
    rareza: rara
    condicionales:
      - tipo: tramo
        valor: sexto_sol
        fuerzaDelta: 2
        efectoTexto: "En el Sexto Sol: +2 fuerza"
    flavor: El sol que vendrá se forja en lo que estamos dispuestos a perder.

  - id: TZH-004
    nombre: Salva Ritual
    raza: Tezhal
    categoria: Ataque
    coste: 3
    fuerza_base: 4
    penalizacion_acierto: 1
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: descarte_oponente
        valor: 1
    flavor: Cuando el otro alza el escudo, el atacante ya leyó el escudo.

  - id: TZH-005
    nombre: Plumaje Encendido
    raza: Tezhal
    categoria: Ataque
    coste: 5
    fuerza_base: 5
    penalizacion_acierto: 2
    rareza: rara
    condicionales:
      - tipo: atributo_propio
        valorAtributo: Ataque
        umbral: 5
        fuerzaDelta: 2
        efectoTexto: "Si tu Fuerza ≥ 5: +2 fuerza"
    flavor: Las plumas arden mejor cuando nadie esperaba el pájaro.

  - id: TZH-006
    nombre: Espejo Disolutorio
    raza: Tezhal
    categoria: Defensa
    coste: 3
    fuerza_base: 2
    penalizacion_acierto: 0
    rareza: rara
    condicionales: []
    sideEffects:
      - tipo: descarte_oponente
        valor: 1
    flavor: El espejo no devuelve la imagen. La consume.

  - id: TZH-007
    nombre: Hangar de Tlapetl
    raza: Tezhal
    categoria: Defensa
    coste: 4
    fuerza_base: 4
    penalizacion_acierto: 1
    rareza: comun
    condicionales:
      - tipo: heroe_estado
        valor: despertado
        fuerzaDelta: 2
        efectoTexto: "Héroe despertado: +2 fuerza"
    flavor: El hangar no protege a las naves. Las prepara.

  - id: TZH-008
    nombre: Iniciado Xocotzin
    raza: Tezhal
    categoria: Defensa
    coste: 5
    fuerza_base: 4
    penalizacion_acierto: 1
    rareza: rara
    condicionales: []
    sideEffects:
      - tipo: robo_propio
        valor: 1
    flavor: El iniciado mira el ritual ajeno y aprende su nombre.

  - id: TZH-009
    nombre: Brasero del Sol Quinto
    raza: Tezhal
    categoria: Defensa
    coste: 4
    fuerza_base: 3
    penalizacion_acierto: 1
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: bloqueo_planeta
        valor: 1
    flavor: Para apagar el ritual ajeno, primero hay que oler su humo.

  - id: TZH-010
    nombre: Obsidiana Ardiente
    raza: Tezhal
    categoria: Defensa
    coste: 5
    fuerza_base: 5
    penalizacion_acierto: 2
    rareza: rara
    condicionales:
      - tipo: tramo
        valor: sexto_sol
        fuerzaDelta: 1
        efectoTexto: "En el Sexto Sol: +1 fuerza"
    flavor: Lo negro absorbe. Lo ardiente devuelve.

  - id: TZH-011
    nombre: Ofrenda del Xocotzin
    raza: Tezhal
    categoria: Ritual
    coste: 4
    fuerza_base: 4
    penalizacion_acierto: 1
    rareza: rara
    condicionales: []
    sideEffects:
      - tipo: descarte_oponente
        valor: 1
    flavor: La sangre del iniciado enciende el siguiente sol.

  - id: TZH-012
    nombre: Cántico Tlapetl
    raza: Tezhal
    categoria: Ritual
    coste: 5
    fuerza_base: 4
    penalizacion_acierto: 1
    rareza: rara
    condicionales: []
    sideEffects:
      - tipo: robo_propio
        valor: 1
    flavor: El canto no pide permiso al silencio.

  - id: TZH-013
    nombre: Brasa Tlani
    raza: Tezhal
    categoria: Ritual
    coste: 2
    fuerza_base: 2
    penalizacion_acierto: 0
    rareza: comun
    condicionales: []
    flavor: Todo gran fuego empezó como una brasa olvidada.

  - id: TZH-014
    nombre: Pirámide Orbital Quetlani
    raza: Tezhal
    categoria: Ritual
    coste: 6
    fuerza_base: 6
    penalizacion_acierto: 3
    rareza: epica
    condicionales:
      - tipo: eclipse_activo
        fuerzaDelta: 3
        efectoTexto: "Con Eclipse activo: +3 fuerza"
    flavor: La pirámide quema todo lo que sube. Por eso solo sube lo que arde.

  - id: TZH-015
    nombre: Cuchilla del Tonatzin
    raza: Tezhal
    categoria: Ritual
    coste: 3
    fuerza_base: 3
    penalizacion_acierto: 1
    rareza: comun
    condicionales:
      - tipo: heroe_estado
        valor: ascendido
        fuerzaDelta: 2
        efectoTexto: "Héroe ascendido: +2 fuerza"
    flavor: El ritual también corta. Pero corta hacia adentro.
