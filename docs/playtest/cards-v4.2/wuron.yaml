# SEXTO SOL — Pool de cartas Würon v4.2 (Modelo B2 — Premonición como Lectura)
# 15 cartas: 5 Ataque + 5 Defensa + 5 Ritual.
#
# Vibe Würon: control, resiliencia, manipulación de información. Sus cartas
# son más leíbles que las Tezhal (penalizacion_acierto promedio MÁS alta),
# pero compensan con sideEffects que extraen información (mirar_mazo_oponente)
# y manipulan tempo (robo_propio, descarte_oponente). Condicionales premian
# acumulación lenta (atributo_propio/oponente ≥ umbral) y estado avanzado del
# héroe.
#
# Balance esperado (sanity check):
#   - Würon fuerza_base promedio ≈ 2.9 (< Tezhal)
#   - Würon penalizacion_acierto promedio ≈ 2.0 (> Tezhal)

cards:
  - id: WUR-001
    nombre: Aullido del Bosque
    raza: Würon
    categoria: Ataque
    coste: 3
    fuerza_base: 2
    penalizacion_acierto: 2
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: mirar_mazo_oponente
        valor: 1
    flavor: El bosque grita cuando reconoce al cazador.

  - id: WUR-002
    nombre: Cuchilla Lhüf
    raza: Würon
    categoria: Ataque
    coste: 2
    fuerza_base: 2
    penalizacion_acierto: 1
    rareza: comun
    condicionales: []
    flavor: Cuando dos filos se cruzan, gana el que escuchó primero.

  - id: WUR-003
    nombre: Brote Espinado
    raza: Würon
    categoria: Ataque
    coste: 4
    fuerza_base: 3
    penalizacion_acierto: 2
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: descarte_oponente
        valor: 1
    flavor: Quien pisa el brote, sangra la espina y alimenta la raíz.

  - id: WUR-004
    nombre: Lhünke Cazador
    raza: Würon
    categoria: Ataque
    coste: 5
    fuerza_base: 4
    penalizacion_acierto: 3
    rareza: rara
    condicionales:
      - tipo: atributo_oponente
        valorAtributo: Defensa
        umbral: 4
        fuerzaDelta: 2
        efectoTexto: "Si el rival Resguardo ≥ 4: +2 fuerza"
    flavor: El cazador no persigue. Espera. Y cuando se mueve, ya leyó el rastro.

  - id: WUR-005
    nombre: Despertar de la Raíz
    raza: Würon
    categoria: Ataque
    coste: 5
    fuerza_base: 4
    penalizacion_acierto: 2
    rareza: rara
    condicionales: []
    flavor: Lo que dormía bajo la tierra recuerda cómo se quiebra el cielo.

  - id: WUR-006
    nombre: Wütrüpang Resistente
    raza: Würon
    categoria: Defensa
    coste: 3
    fuerza_base: 3
    penalizacion_acierto: 2
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: robo_propio
        valor: 1
    flavor: Lo que resiste no se quiebra. Lo que se quiebra no era resistencia.

  - id: WUR-007
    nombre: Raíz Profunda
    raza: Würon
    categoria: Defensa
    coste: 1
    fuerza_base: 1
    penalizacion_acierto: 1
    rareza: comun
    condicionales: []
    flavor: La raíz crece más rápido cuando la pisan.

  - id: WUR-008
    nombre: Bosque del Eco
    raza: Würon
    categoria: Defensa
    coste: 3
    fuerza_base: 2
    penalizacion_acierto: 2
    rareza: rara
    condicionales: []
    sideEffects:
      - tipo: mirar_mazo_oponente
        valor: 1
    flavor: El bosque devuelve lo que se grita en él. Por eso, el cazador calla.

  - id: WUR-009
    nombre: Trono de Lhülkan
    raza: Würon
    categoria: Defensa
    coste: 5
    fuerza_base: 4
    penalizacion_acierto: 3
    rareza: rara
    condicionales:
      - tipo: atributo_propio
        valorAtributo: Defensa
        umbral: 5
        fuerzaDelta: 2
        efectoTexto: "Si tu Resguardo ≥ 5: +2 fuerza"
    flavor: El trono no se conquista. Se hereda por escucha.

  - id: WUR-010
    nombre: Raíz Ancestral
    raza: Würon
    categoria: Defensa
    coste: 4
    fuerza_base: 3
    penalizacion_acierto: 2
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: bloqueo_planeta
        valor: 1
    flavor: Antes del bosque hubo una sola raíz. Sigue ahí.

  - id: WUR-011
    nombre: Susurro del Bosque
    raza: Würon
    categoria: Ritual
    coste: 2
    fuerza_base: 2
    penalizacion_acierto: 1
    rareza: comun
    condicionales: []
    sideEffects:
      - tipo: robo_propio
        valor: 1
    flavor: El susurro nunca grita. Por eso se escucha desde más lejos.

  - id: WUR-012
    nombre: Savia Antigua
    raza: Würon
    categoria: Ritual
    coste: 5
    fuerza_base: 3
    penalizacion_acierto: 2
    rareza: rara
    condicionales:
      - tipo: heroe_estado
        valor: ascendido
        fuerzaDelta: 2
        efectoTexto: "Héroe ascendido: +2 fuerza"
    flavor: La savia recuerda lo que el tronco olvida.

  - id: WUR-013
    nombre: Lhüpang del Río
    raza: Würon
    categoria: Ritual
    coste: 6
    fuerza_base: 5
    penalizacion_acierto: 3
    rareza: epica
    condicionales:
      - tipo: eclipse_activo
        fuerzaDelta: 2
        efectoTexto: "Con Eclipse activo: +2 fuerza"
    sideEffects:
      - tipo: descarte_oponente
        valor: 1
    flavor: El río que baja del Sur Profundo lleva memoria de cada cosa que tocó.

  - id: WUR-014
    nombre: Eco del Brote
    raza: Würon
    categoria: Ritual
    coste: 3
    fuerza_base: 2
    penalizacion_acierto: 2
    rareza: comun
    condicionales: []
    flavor: Cada brote es un eco del primer bosque.

  - id: WUR-015
    nombre: Lhwentrü de las Raíces
    raza: Würon
    categoria: Ritual
    coste: 5
    fuerza_base: 3
    penalizacion_acierto: 2
    rareza: rara
    condicionales: []
    sideEffects:
      - tipo: robo_propio
        valor: 1
    flavor: Lhwentrü no manda al bosque. Lo escucha hasta que el bosque manda solo.
