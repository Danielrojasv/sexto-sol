# SEXTO SOL — Cartas de Estrella v4.0
# 3 cartas. Después de cerrar Nebulosa, cada jugador elige su planeta-Estrella
# del pool. Ambos jugadores pueden elegir el mismo o distintos. La regla
# afecta SOLO al jugador que la eligió, mientras dura el tramo Estrellas
# (turnos 3-4). En Sexto Sol, las reglas de estrella ya no aplican.
#
# Ver GAME-RULES.md §5.8 y §8 de la sección de canon.

stars:
  - id: "STAR-ECO"
    nombre: "Estrella del Eco"
    descripcion: >
      Estrella resonante. Las invocaciones rituales se amplifican y se abaratan
      al atravesarla.
    regla: "Las cartas de Ritual cuestan -1 energía (mínimo 1) mientras estés en Estrellas."
    scope_temporal: "Aplica solo durante el tramo Estrellas (turnos 3-4)."
    flavor: "El cosmos repite lo que escucha. Quien canta más claro, vuelve más fuerte."

  - id: "STAR-SANGRANTE"
    nombre: "Estrella Sangrante"
    descripcion: >
      Estrella roja, herida desde antes del virus. Conserva memoria de daño.
      Quien la atraviesa hereda esa memoria como impulso de ataque.
    regla: "Las cartas de Ataque ganan +1 fuerza base mientras estés en Estrellas."
    scope_temporal: "Aplica solo durante el tramo Estrellas (turnos 3-4)."
    flavor: "No todas las estrellas brillan. Algunas sangran. Esas son las que recuerdan."

  - id: "STAR-SILENCIOSA"
    nombre: "Estrella Silenciosa"
    descripcion: >
      Estrella donde el sigilo no existe. La quietud absoluta disuelve los
      escudos rituales; a cambio, el silencio fuerza claridad y entrega lecturas
      extra del cosmos.
    regla: |
      No podés jugar cartas de Defensa mientras estés en Estrellas.
      A cambio, robás 1 carta extra al inicio del tramo.
    scope_temporal: "Aplica solo durante el tramo Estrellas (turnos 3-4)."
    flavor: "En el silencio no hay donde esconderse. Por eso quien lo elige ya decidió mostrarse."
