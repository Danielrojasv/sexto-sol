        efectoTexto: +3 fuerza, y descartá 1 carta de tu mano
      - tipo: premonicion_acierta
        fuerzaDelta: -2
        efectoTexto: -2 fuerza
    flavor: El sol que vendrá se forja en lo que estamos dispuestos a perder.
  - id: TZH-004
