# SEXTO SOL — Pool de cartas Tezhal v4.1 (formato estructurado)
# 15 cartas: 5 Ataque + 5 Defensa + 5 Ritual
# Distribución coste: 3 cards 1-2 + 6 cards 3-4 + 4 cards 5-6 + 2 flex
# Vibe Tezhal: aggro, sacrificio, comprometerse temprano. Premia declarar Ataque
# y jugar Ataques. Rituales son raros y representan rituales de sangre (descarte
# propio a cambio de fuerza explosiva). Defensas son punzantes — anular + contraatacar,
# no absorber.
#
# Formato v4.1: condicionales con campos estructurados (fuerzaDelta, sideEffect)
# parseados al cargar. efectoTexto preserva el texto original para UI.
# Ver GAME-RULES.md §4 y docs/specs/engine-v4.1-migration.md (rev 3, IQ3 cerrada).

cards:
  - id: TZH-001
    nombre: Lanza Solar
    raza: Tezhal
    categoria: Ataque
    coste: 2
    fuerza_base: 3
    rareza: comun
    condicionales:
      - tipo: premonicion_propia
        valor: Ataque
        fuerzaDelta: 2
        efectoTexto: +2 fuerza
      - tipo: premonicion_oponente
        valor: Defensa
        sideEffect:
          tipo: descarte
          target: oponente
          valor: 1
        efectoTexto: el oponente descarta 1 carta
    flavor: El primer rayo cae antes de que el enemigo nombre su miedo.
  - id: TZH-002
    nombre: Filo del Tonatzin
    raza: Tezhal
    categoria: Ataque
    coste: 1
    fuerza_base: 2
    rareza: comun
    condicionales:
      - tipo: premonicion_propia
        valor: Ataque
        fuerzaDelta: 1
        efectoTexto: +1 fuerza
      - tipo: premonicion_oponente
        valor: Ataque
        fuerzaDelta: 1
        efectoTexto: +1 fuerza
    flavor: Los filos no negocian. Se cruzan.
  - id: TZH-003
