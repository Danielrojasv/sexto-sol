# SEXTO SOL — Pool de cartas Würon v4.1 (formato estructurado)
# 15 cartas: 5 Ataque + 5 Defensa + 5 Ritual
# Distribución coste: 3 cards 1-2 + 6 cards 3-4 + 4 cards 5-6 + 2 flex
# Vibe Würon: control, resiliencia, lectura. Premia leer al oponente y jugar
# Defensa. Mecánicas firma: anular fuerza enemiga, ganar bonus cuando la
# premonición acierta, robo de cartas. Los Ataques Würon existen pero son
# contraataques (potenciados si oponente jugó Ataque).
#
# Formato v4.1: condicionales con campos estructurados (fuerzaDelta, sideEffect)
# parseados al cargar. efectoTexto preserva el texto original para UI.
# Ver GAME-RULES.md §4 y docs/specs/engine-v4.1-migration.md (rev 3, IQ3 cerrada).

cards:
  - id: WUR-001
    nombre: Aullido del Bosque
    raza: Würon
    categoria: Ataque
    coste: 3
    fuerza_base: 3
    rareza: comun
    condicionales:
      - tipo: premonicion_propia
        valor: Ataque
        fuerzaDelta: 1
        efectoTexto: +1 fuerza
      - tipo: premonicion_acierta
        fuerzaDelta: 2
        sideEffect:
          tipo: robo
          target: propio
          valor: 1
        efectoTexto: +2 fuerza adicional y robá 1 carta
    flavor: El bosque grita cuando reconoce al cazador.
