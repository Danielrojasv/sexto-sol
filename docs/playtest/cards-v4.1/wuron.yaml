# SEXTO SOL — Pool de cartas Würon v4.0
# 15 cartas: 5 Ataque + 5 Defensa + 5 Ritual
# Distribución coste: 3 cards 1-2 + 6 cards 3-4 + 4 cards 5-6 + 2 flex
# Vibe Würon: control, resiliencia, lectura. Premia leer al oponente y jugar
# Defensa. Mecánicas firma: anular fuerza enemiga, ganar bonus cuando la
# premonición acierta, robo de cartas. Los Ataques Würon existen pero son
# contraataques (potenciados si oponente jugó Ataque).
#
# Formato: ver GAME-RULES.md §4 y SPEC v4.0 §6.3.

cards:
  # ============================================================================
  # ATAQUE — 5 cartas (contraataques reactivos)
  # ============================================================================

  - id: "WUR-001"
    nombre: "Aullido del Bosque"
    raza: "Würon"
    categoria: "Ataque"
    coste: 3
    fuerza_base: 3
    rareza: "comun"
    condicionales:
      - tipo: "premonicion_propia"
        valor: "Ataque"
        efecto: "+1 fuerza"
      - tipo: "premonicion_acierta"
        efecto: "+2 fuerza adicional y robá 1 carta"
    flavor: "El bosque grita cuando reconoce al cazador."

  - id: "WUR-002"
    nombre: "Cuchilla Lhüf"
    raza: "Würon"
    categoria: "Ataque"
    coste: 2
    fuerza_base: 2
    rareza: "comun"
    condicionales:
      - tipo: "premonicion_oponente"
        valor: "Ataque"
        efecto: "+2 fuerza"
    flavor: "Cuando dos filos se cruzan, gana el que escuchó primero."

  - id: "WUR-003"
    nombre: "Brote Espinado"
    raza: "Würon"
    categoria: "Ataque"
    coste: 4
    fuerza_base: 3
    rareza: "comun"
    condicionales:
      - tipo: "premonicion_oponente"
        valor: "Ataque"
        efecto: "anula 2 fuerza de la carta enemiga y +2 fuerza propia"
    flavor: "Quien pisa el brote, sangra la espina y alimenta la raíz."

  - id: "WUR-004"
    nombre: "Lhünke Cazador"
    raza: "Würon"
    categoria: "Ataque"
    coste: 5
    fuerza_base: 4
    rareza: "rara"
    condicionales:
      - tipo: "premonicion_acierta"
        efecto: "+3 fuerza y robá 1 carta"
      - tipo: "premonicion_oponente"
        valor: "Ritual"
        efecto: "+1 fuerza adicional"
    flavor: "El cazador no persigue. Espera. Y cuando se mueve, ya leyó el rastro."

  - id: "WUR-005"
    nombre: "Despertar de la Raíz"
    raza: "Würon"
    categoria: "Ataque"
    coste: 5
    fuerza_base: 4
    rareza: "rara"
    condicionales:
      - tipo: "premonicion_propia"
        valor: "Ataque"
        efecto: "+2 fuerza"
      - tipo: "premonicion_oponente"
        valor: "Ataque"
        efecto: "+2 fuerza adicional"
    flavor: "Lo que dormía bajo la tierra recuerda cómo se quiebra el cielo."

  # ============================================================================
  # DEFENSA — 5 cartas (anular + resiliencia)
  # ============================================================================

