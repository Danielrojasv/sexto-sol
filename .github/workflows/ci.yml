name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for gitleaks scan.
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test + Coverage
        # Engine kernel: lines/funcs/statements ≥85%. Branches ≥70% — el
        # renderer i18n tiene muchas ramas de variantes narrativas que no
        # todas se ejercitan en Phase D; cuando lleguen cartas reales en
        # Phase F el branch coverage naturalmente sube. Lifteamos el branch
        # threshold cuando lleguemos a 80%+ orgánicamente.
        run: pnpm test:coverage --coverage.thresholds.lines=85 --coverage.thresholds.functions=85 --coverage.thresholds.branches=70 --coverage.thresholds.statements=85

      - name: Build
        run: pnpm build

  validate-cards:
    name: Validate card data
    runs-on: ubuntu-latest
    # Job separado: si solo cambian cartas, fallar este job es señal específica
    # de que el balance/naming está roto, sin contaminar el job principal.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate cards
        run: pnpm validate:cards
